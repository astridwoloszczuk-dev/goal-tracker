<script>
function garminBadge(sessionName){
  if(!window.GARMIN) return '';
  const todayKey=new Date().toISOString().slice(0,10);
  if(window.GARMIN.date!==todayKey) return '';
  // Support new format (readiness.sessions) with fallback to old format
  let st, reason='';
  if(window.GARMIN.readiness&&window.GARMIN.readiness.sessions&&window.GARMIN.readiness.sessions[sessionName]){
    st=window.GARMIN.readiness.sessions[sessionName].status;
    reason=window.GARMIN.readiness.sessions[sessionName].reason||'';
  } else if(window.GARMIN.metrics&&window.GARMIN.metrics.session_status){
    st=window.GARMIN.metrics.session_status[sessionName];
  } else return '';
  const s='position:absolute;top:1px;right:2px;font-size:8px;line-height:1;pointer-events:none';
  const tip=reason?` title="${reason.replace(/"/g,'&quot;')}"` :'';
  if(st==='good')    return `<span style="${s}"${tip}>⭐</span>`;
  if(st==='caution') return `<span style="${s}"${tip}>❓</span>`;
  if(st==='poor')    return `<span style="${s};color:#f87171"${tip}>✗</span>`;
  return '';
}

<script>
const DAYFULL=['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
const DAYS=['So','Mo','Di','Mi','Do','Fr','Sa'];

const CATS=[
  {id:'round',label:'Rounds',col:'#c8a96e',opts:[

    {id:'sc_pyramid',label:'Scoring Game – Pyramid',type:'game',slot:'Score',extra:{t:'num',label:'Attempts needed'}},

  ]},

    {id:'sga_drill',label:'SGA Drill',type:'drill',slot:'Pitch',extra:{t:'text',label:'Describe'}},
    {id:'sga_10to2',label:'SGA Game – 10 to 2m',type:'game',slot:'Pitch',extra:{t:'num',label:'Within 2m'}},
    {id:'sga_olly',label:'SGA Game – Olly',type:'game',slot:'Pitch',extra:{t:'text',label:'Describe'}},
  ]},
  {id:'putt',label:'Putting/Chipping',col:'#c084fc',opts:[
    {id:'pt_pace',label:'Drill – 9 Ball Pace',type:'drill',slot:'Putt/Chip',extra:null},
    {id:'pt_clock',label:'Drill – 1/2/3m Around the Clock',type:'drill',slot:'Putt/Chip',extra:null},
    {id:'pt_free',label:'Putting/Chipping Drill',type:'drill',slot:'Putt/Chip',extra:{t:'text',label:'Describe'}},
    {id:'pt_wes',label:'Game – Wes to 12 Points',type:'game',slot:'Putt/Chip',extra:{t:'num',label:'Score'}},
    {id:'pt_olly',label:'Game – Olly',type:'game',slot:'Putt/Chip',extra:{t:'text',label:'Describe'}},
  ]},
];

const DRILL_SLOTS=['Score','Drive','Pitch','Putt/Chip','Putt/Chip2'];
const GAME_SLOTS=['Score','Drive','Pitch','Putt/Chip','Putt/Chip2','Round'];
const GLASSES=6;

// ── STORAGE ──────────────────────────────────────────────────────
function sg(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}}
function ss(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function ld(dkey){return sg('d_'+dkey)||{};}
function sd(dkey,data){ss('d_'+dkey,data);}
function getSess(dkey){return sg('s_'+dkey)||[];}
function saveSess(dkey,arr){ss('s_'+dkey,arr);}

// ── SUPABASE SYNC ─────────────────────────────────────────────────
const SB_URL='https://ykbabwkyojlwculjmbrw.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlrYmFid2t5b2psd2N1bGptYnJ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MTg0NzMsImV4cCI6MjA5MjA5NDQ3M30.4lYnVcgv1o9OvXGMtrbjwKhXZ8Yybqln08aci_ZM9mI';

async function sbReq(path,method,body){
  if(!SB_URL||SB_URL.startsWith('YOUR_'))return;
  try{
    await fetch(SB_URL+'/rest/v1/'+path,{
      method:method||'POST',
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates,return=minimal'},
      body:body!=null?JSON.stringify(body):undefined,
    });
  }catch(e){console.warn('Supabase sync:',e);}
}

async function syncDayHabits(dkey){
  await sbReq('daily_habits','POST',{
    date:dkey,
    water_glasses:sg('wat_'+dkey)||0,
    mirror:getWbar('mirror',dkey),
    protein:getWbar('protein',dkey),
    stretch:getWbar('stretch',dkey),
    alcohol:getWbar('alc',dkey),
  });
}

async function syncCardioGym(dkey){
  const rows=[];
  for(let i=0;i<4;i++)rows.push({date:dkey,type:'cardio',slot_index:i,value:getWbar('cardio_'+i,dkey)});
  for(let i=0;i<3;i++)rows.push({date:dkey,type:'gym',slot_index:i,value:getWbar('fit_'+i,dkey)});
  await sbReq('cardio_gym','POST',rows);
}

async function syncGolfSessions(dkey){
  await sbReq('golf_sessions?date=eq.'+dkey,'DELETE');
  const sess=getSess(dkey);
  if(sess.length>0)await sbReq('golf_sessions','POST',sess.map(s=>({date:dkey,cat:s.cat,opt_id:s.optId,type:s.type,slot:s.slot,label:s.label,extra_value:s.ev})));
}

async function syncRounds(){
  const rounds=sg('rounds')||[];
  await sbReq('golf_rounds?date=gte.2020-01-01','DELETE');
  if(rounds.length>0)await sbReq('golf_rounds','POST',rounds.map(r=>({date:r.date,course:r.course||'',comp:r.comp||false,notes:r.notes||'',holes_data:r.holesData||null})));
}

async function syncVacation(weekDkey,isVac){
  if(isVac)await sbReq('vacation_weeks','POST',{week_start:weekDkey});
  else await sbReq('vacation_weeks?week_start=eq.'+weekDkey,'DELETE');
}

// ── DATE UTILS ───────────────────────────────────────────────────
function today(){return new Date();}
function dk(d){return d.toISOString().slice(0,10);}
function dkToday(){return dk(today());}
function wmon(d){const x=new Date(d);const day=x.getDay();x.setDate(x.getDate()-day+(day===0?-6:1));return x;}
function weekDays(){
  const mon=wmon(today());const days=[];
  for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);days.push({d,dkey:dk(d),dow:d.getDay(),isToday:dk(d)===dkToday()});}
  return days;
}
function daysElapsed(){
  // how many days of the week have passed including today (Mon=1..Sun=7)
  const dow=today().getDay();
  return dow===0?7:dow; // getDay: 0=Sun
  // Mon=1,Tue=2,...,Sat=6,Sun=0 → we want Mon=1..Sun=7
  // wmon starts Monday, so elapsed = dow===0?7:dow
}

// ── HELPERS ──────────────────────────────────────────────────────
function nn(v){return v!=null&&v!=='';}
function gv(id){const e=document.getElementById(id);return e?e.value:'';}
function sv(id,v){const e=document.getElementById(id);if(e)e.value=(v||'');}
function el(id){return document.getElementById(id);}
function setHtml(id,h){const e=el(id);if(e)e.innerHTML=h;}

// ── PAGE ROUTER ──────────────────────────────────────────────────
let CUR='today';
function go(p){
  document.querySelectorAll('.pg').forEach(e=>e.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(e=>e.classList.remove('on'));
  el('pg-'+p).classList.add('on');
  el('nb-'+p).classList.add('on');
  CUR=p;
  try{
    if(p==='today')renderToday();
    else if(p==='week')renderWeek();
    else if(p==='rounds')renderRounds();
    else if(p==='analytics')renderAnalytics();
    else if(p==='export')renderExport();
  }catch(e){console.error(p,e);el('pg-'+p).innerHTML='<div class="card"><p style="color:var(--rd)">Fehler: '+e.message+'</p></div>';}
}

// ── WEEK BAR DATA ─────────────────────────────────────────────────
// Generic week bar: key per day = wbar_{barId}_{dkey} = 0|1|2 (0=empty,1=done,2=extra)
function getWbar(barId,dkey){return sg('wbar_'+barId+'_'+dkey)||0;}
function setWbar(barId,dkey,val){ss('wbar_'+barId+'_'+dkey,val);}

function tapWbar(barId,dkey,maxVal){
  maxVal=maxVal||2;
  const cur=getWbar(barId,dkey);
  setWbar(barId,dkey,cur>=maxVal?0:cur+1);
  if(barId.startsWith('cardio_')||barId.startsWith('fit_'))syncCardioGym(dkey);
  else syncDayHabits(dkey);
  go(CUR);
}

// Week bar HTML builder
// slots = [{dkey, dow, isToday}]
// barId = string key
// labels = array of slot labels (optional, uses DAYS if null)
// colorFn(val, slotIdx, allVals) => css class
function wbarHtml(barId,days,title,note,maxVal,colorFn,showVal){
  maxVal=maxVal||2;
  let h=`<div class="wbar-row">`;
  h+=`<div class="wbar-label"><span>${title}</span>${note?`<span style="font-size:10px;color:var(--mu)">${note}</span>`:''}</div>`;
  h+=`<div class="wbar-slots">`;
  for(const day of days){
    const val=getWbar(barId,day.dkey);

// ── SLOT COUNTS (golf) ────────────────────────────────────────────
function getSlotCounts(){
  // aggregate all sessions across the whole current week
  // Putt/Chip has 2 slots: first fills 'Putt/Chip', overflow fills 'Putt/Chip2'
  const dr={},gm={};
  for(const day of weekDays()){
    for(const s of getSess(day.dkey)){
      let slot=s.slot;
      const map=s.type==='drill'?dr:gm;
      if(slot==='Putt/Chip'){
        // fill first slot, then overflow to second
        const cur=map['Putt/Chip']||0;
        if(cur>=1) slot='Putt/Chip2';
      }
      map[slot]=(map[slot]||0)+1;
    }
  }
  return{dr,gm};
}

// Auto-compute Round slot from rounds tab
function roundSlotDone(){
  const rounds=sg('rounds')||[];
  const mon=wmon(today());const monDk=dk(mon);
  const total=rounds.filter(r=>{
    if(!r.date)return false;
    return dk(wmon(new Date(r.date+'T12:00:00')))===monDk;
  }).reduce((s,r)=>{
    if(r.holesData)return s+deriveRoundStats(r.holesData).n;
    return s+Number(r.holes||18);
  },0);
  return total>=9;
}

// ── GITHUB ACTIVITY LOG ───────────────────────────────────────────
function ghCfg(){
  return{
    token: localStorage.getItem('gh_token')||'',
    owner: localStorage.getItem('gh_owner')||'',
    repo:  localStorage.getItem('gh_repo')||'',
  };
}

async function logActivity(date,activity){
  const cfg=ghCfg();
  if(!cfg.token||!cfg.owner||!cfg.repo)return;
  const url=`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/activity_log.json`;
  const headers={'Authorization':'token '+cfg.token,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'};
  try{
    const resp=await fetch(url,{headers});
    let entries=[],sha=null;
    if(resp.ok){
      const data=await resp.json();
      sha=data.sha;
      entries=JSON.parse(atob(data.content.replace(/\n/g,'')));
    }
    if(entries.some(e=>e.date===date&&e.activity===activity))return; // already logged
    entries.push({date,activity});
    entries.sort((a,b)=>a.date.localeCompare(b.date));
    const body={message:`log: ${activity} on ${date}`,content:btoa(unescape(encodeURIComponent(JSON.stringify(entries,null,2))))};
    if(sha)body.sha=sha;
    await fetch(url,{method:'PUT',headers,body:JSON.stringify(body)});
    console.log(`Logged: ${activity} on ${date}`);
  }catch(e){console.warn('Activity log error:',e);}
}

// ── ROUNDS ────────────────────────────────────────────────────────
let rounds=[],editIdx=null;

function deriveRoundStats(hd){
  if(!hd||!hd.length)return{n:0,delta:null,gir:null,fw:null,ud:null,p3:null,db:null,b5:null,dc:null,bs:null};
  const played=hd.filter(h=>h.par!=null&&h.par!==''&&h.score!=null&&h.score!=='');
  const n=played.length;
  if(!n)return{n:0,delta:null,gir:null,fw:null,ud:null,p3:null,db:null,b5:null,dc:null,bs:null};
  const delta=played.reduce((s,h)=>s+(Number(h.score)-Number(h.par)),0);
  const gir=played.filter(h=>h.gir).length;
  const fw=played.filter(h=>h.fw&&Number(h.par)!==3).length;
  const ud=played.filter(h=>h.ud&&!h.gir).length;
  const p3=played.filter(h=>h.p3).length;
  const db=played.filter(h=>Number(h.score)>=Number(h.par)+2).length;
  const b5=played.filter(h=>Number(h.par)===5&&Number(h.score)>=6).length;
  const dc=played.filter(h=>h.dc).length;
  const bs=played.filter(h=>h.bs).length;
  return{n,delta,gir,fw,ud,p3,db,b5,dc,bs};
}

function getRoundStats(r){
  if(r.holesData){
    const s=deriveRoundStats(r.holesData);
    return{...s,holes:s.n};
  }
  // legacy format
  return{
    n:Number(r.holes||18),holes:Number(r.holes||18),
    delta:nn(r.delta)?Number(r.delta):null,
    gir:nn(r.gir)?Number(r.gir):null,
    fw:nn(r.fw)?Number(r.fw):null,
    ud:nn(r.ud)?Number(r.ud):null,
    p3:nn(r.p3)?Number(r.p3):null,
    db:nn(r.db)?Number(r.db):null,
    b5:nn(r.b5)?Number(r.b5):null,
    dc:nn(r.dc)?Number(r.dc):null,
    bs:nn(r.bs)?Number(r.bs):null
  };
}

function subRound(){
  if(!gv('rf_d'))return;
  const holesData=Array.from({length:18},(_,i)=>({
    par:el('hp_'+i)?el('hp_'+i).value:'',
    score:el('hs_'+i)?el('hs_'+i).value:'',
    fw:el('hfw_'+i)?el('hfw_'+i).checked:false,
    gir:el('hgir_'+i)?el('hgir_'+i).checked:false,
    ud:el('hud_'+i)?el('hud_'+i).checked:false,
    p3:el('h3p_'+i)?el('h3p_'+i).checked:false,
    dc:el('hdc_'+i)?el('hdc_'+i).checked:false,
    bs:el('hbs_'+i)?el('hbs_'+i).checked:false,
  }));
  const badHoles=holesData.filter(h=>h.score!==''&&(h.par===''||h.par==null));
  if(badHoles.length>0){
    const ok=confirm(badHoles.length+' Loch/Löcher haben Score aber kein Par — diese werden nicht gewertet. Trotzdem speichern?');
    if(!ok)return;
  }
  const r={date:gv('rf_d'),course:gv('rf_c'),comp:el('rf_co').checked,notes:gv('rf_n'),holesData};
  if(editIdx!==null)rounds[editIdx]=r;else rounds.unshift(r);
  ss('rounds',rounds);editIdx=null;
  syncRounds();
  logActivity(gv('rf_d'),'golf');
  renderRounds();
}

// ── ANALYTICS ─────────────────────────────────────────────────────
function getWeekData(weeksBack){
  const t=today();const out=[];
  for(let w=weeksBack-1;w>=0;w--){
    const mon=new Date(wmon(t));mon.setDate(mon.getDate()-w*7);
    const lbl=mon.toLocaleDateString('de-AT',{day:'2-digit',month:'2-digit'});
    const wdays=[];for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);wdays.push({d,dkey:dk(d)});}
    let mirror=0,protein=0,stretch=0,watMet=0,alc=0;
    let cardio=0,fit=0,range=0,sga=0,chipputt=0;
    for(const wd of wdays){
      if(getWbar('mirror',wd.dkey)>=1)mirror++;
      if(getWbar('protein',wd.dkey)>=1)protein++;
      if(getWbar('stretch',wd.dkey)>=1)stretch++;
      if((sg('wat_'+wd.dkey)||0)>=GLASSES)watMet++;
      if(getWbar('alc',wd.dkey)>=1)alc++;
      // count days (not total slot taps)
      if([0,1,2,3].some(i=>getWbar('cardio_'+i,wd.dkey)>=1))cardio++;
      if([0,1,2].some(i=>getWbar('fit_'+i,wd.dkey)>=1))fit++;
      const sess=getSess(wd.dkey);
      range+=sess.filter(s=>s.cat==='range').length;
      sga+=sess.filter(s=>s.cat==='sga').length;
      chipputt+=sess.filter(s=>s.cat==='putt').length;
    }
    const rds=(sg('rounds')||[]).filter(r=>{
      if(!r.date)return false;
      return dk(wmon(new Date(r.date+'T12:00:00')))===dk(mon);
    });
    const sc18=(v,n)=>v!==null&&n>0?v*18/n:null;
    const rdStats=rds.map(r=>getRoundStats(r));
    const deltas=rdStats.filter(s=>s.delta!==null&&s.n>0).map(s=>sc18(s.delta,s.n));
    const girs=rdStats.filter(s=>s.gir!==null&&s.n>0).map(s=>sc18(s.gir,s.n));
    const uds=rdStats.filter(s=>s.ud!==null&&s.n>0).map(s=>sc18(s.ud,s.n));
    const dbs=rdStats.filter(s=>s.db!==null&&s.n>0).map(s=>sc18(s.db,s.n));
    const avg=arr=>arr.length?(arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(1):null;
    const holes=rdStats.reduce((s,st)=>s+(st.n||0),0);
    const isVacWeek=!!sg('vac_'+dk(mon));
    if(isVacWeek){
      out.push({lbl,vacation:true,mirror:null,protein:null,stretch:null,watMet:null,alc:null,cardio:null,fit:null,holes:null,range:null,sga:null,chipputt:null,rounds:null,comp:null,avgDelta:null,avgGir:null,avgUd:null,avgDb:null});
    }else{
      out.push({lbl,vacation:false,mirror,protein,stretch,watMet,alc,cardio,fit,holes,range,sga,chipputt,
        rounds:rds.length,comp:rds.filter(r=>r.comp).length,
        avgDelta:avg(deltas),avgGir:avg(girs),avgUd:avg(uds),avgDb:avg(dbs)});
    }
  }
  return out;
}

function drawChart(id,labels,datasets,opts){
  opts=opts||{};
  const c=el(id);if(!c)return;
  const ctx=c.getContext('2d');
  const W=c.width,H=c.height;
  const p={t:12,r:32,b:28,l:32}; // both sides y-axis
  const cW=W-p.l-p.r,cH=H-p.t-p.b;
  ctx.clearRect(0,0,W,H);
  const all=datasets.flatMap(d=>d.vals.filter(v=>v!==null));
  if(!all.length){
    ctx.fillStyle='rgba(255,255,255,0.25)';ctx.font='12px sans-serif';ctx.textAlign='center';
    ctx.fillText('Noch keine Daten',W/2,H/2);return;
  }
  const mn=opts.z?0:Math.min(...all);
  const mx=Math.max(...all,(opts.z?1:mn+1));
  const rng=mx-mn||1;const n=labels.length;const step=n>1?cW/(n-1):cW;
  // grid + y-axis both sides
  ctx.lineWidth=1;
  for(let i=0;i<=4;i++){
    const y=p.t+cH*(1-i/4);
    ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.beginPath();ctx.moveTo(p.l,y);ctx.lineTo(p.l+cW,y);ctx.stroke();
    const v=mn+rng*i/4;const vStr=Number.isInteger(v)?v:v.toFixed(1);
    // left
    ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='9px sans-serif';ctx.textAlign='right';
    ctx.fillText(vStr,p.l-3,y+3);
    // right
    ctx.textAlign='left';ctx.fillText(vStr,p.l+cW+3,y+3);
  }
  // x labels
  ctx.fillStyle='rgba(255,255,255,0.35)';ctx.font='9px sans-serif';ctx.textAlign='center';
  labels.forEach((l,i)=>{if(n<=8||i%2===0)ctx.fillText(l,p.l+i*step,H-6);});
  // datasets
  for(const ds of datasets){
    if(ds.target!==undefined){
      const ty=p.t+cH*(1-(ds.target-mn)/rng);
      ctx.setLineDash([4,3]);ctx.strokeStyle=ds.col+'55';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(p.l,ty);ctx.lineTo(p.l+cW,ty);ctx.stroke();ctx.setLineDash([]);
    }
    ctx.strokeStyle=ds.col;ctx.lineWidth=2;ctx.beginPath();let first=true;
    ds.vals.forEach((v,i)=>{
      if(v===null)return;
      const x=p.l+i*step;const y=p.t+cH*(1-(Number(v)-mn)/rng);
      if(first){ctx.moveTo(x,y);first=false;}else ctx.lineTo(x,y);
    });
    ctx.stroke();
    ds.vals.forEach((v,i)=>{
      if(v===null)return;
      const x=p.l+i*step;const y=p.t+cH*(1-(Number(v)-mn)/rng);
      ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fillStyle=ds.col;ctx.fill();
    });
  }
}

function buildReport(weeks){
  const data=getWeekData(weeks);const rds=sg('rounds')||[];
  let t='╔══════════════════════════════════════╗\n║       GOLF PERFORMANCE REPORT         ║\n';
  t+=`║  ${today().toLocaleDateString('de-AT').padEnd(34)}║\n╚══════════════════════════════════════╝\n\n`;
  const last=data[data.length-1];
  t+=`LETZTE WOCHE\nRunden: ${last.rounds} (${last.comp}× Competitive)\n`;
  if(last.avgDelta!==null)t+=`Ø Score: ${Number(last.avgDelta)>0?'+':''}${last.avgDelta} zum Par\n`;
  if(last.avgGir!==null)t+=`Ø GIR: ${last.avgGir}\n`;
  t+=`Sessions: ${last.totSess} (${last.drills} Drills, ${last.games} Games)\n\n`;
  t+=`ÜBERSICHT (letzte ${weeks} Wochen)\n`;
  t+='Woche    | Rdn | Score  | GIR  | U&D  | Dbl | Sess\n---------+-----+--------+------+------+-----+-----\n';
  for(const w of data){
    const sc=w.avgDelta!==null?(Number(w.avgDelta)>0?'+':'')+w.avgDelta:'—';
    t+=`${w.lbl.padEnd(8)} | ${String(w.rounds).padEnd(3)} | ${String(sc).padEnd(6)} | ${String(w.avgGir||'—').padEnd(4)} | ${String(w.avgUd||'—').padEnd(4)} | ${String(w.avgDb||'—').padEnd(3)} | ${w.totSess}\n`;
  }
  t+='\nLETZTE RUNDEN\n';
  for(const r of rds.slice(0,8)){
    const s=getRoundStats(r);
    const sc18=(v,n)=>v!==null&&n>0?(v*18/n).toFixed(1):null;
    t+=`${r.date||'—'} ${r.course||''} ${r.comp?'[Competitive]':''}\n  ${s.n||'?'} Loch`;
    if(s.delta!==null)t+=`, ${Number(s.delta)>0?'+':''}${s.delta} Par${s.n<18?' ('+sc18(s.delta,s.n)+'/18)':''}`;
    if(s.gir!==null)t+=`, GIR:${s.gir}`;
    if(s.fw!==null)t+=`, FW:${s.fw}`;
    if(s.ud!==null)t+=`, U&D:${s.ud}`;
    if(s.p3!==null)t+=`, 3P:${s.p3}`;
    if(s.db!==null)t+=`, Dbl:${s.db}`;
    if(s.dc!==null)t+=`, DC:${s.dc}`;
    if(s.bs!==null)t+=`, B9+:${s.bs}`;
    t+='\n';if(r.notes)t+=`  → ${r.notes}\n`;
  }
  t+='\nGEWOHNHEITEN (letzte 6 Wochen)\n';
  for(const w of data.slice(-6)){
    t+=`${w.lbl}: Putten ${w.mirror}/7 | Protein ${w.protein}/7 | Stretch ${w.stretch}/7 | Wasser ${w.watMet}/7 | Cardio ${w.cardio} | Gym ${w.fit}\n`;
  }
  return t;
}

      <div class="fr"><label>Repository Name</label>
        <input type="text" id="gh_repo_inp" value="${cfg.repo}" placeholder="goal-tracker"></div>
      <div class="fr"><label>Personal Access Token (Contents: read+write)</label>
        <input type="text" id="gh_token_inp" value="${cfg.token}" placeholder="github_pat_..." autocomplete="off" style="font-family:monospace;font-size:12px"></div>
      <div class="rbtns">
        <button class="btn btnp" onclick="saveGhCfg()">💾 Speichern</button>
        <button class="btn" onclick="testGhCfg()">🔗 Verbindung testen</button>
      </div>
      <div id="gh-status" style="font-size:12px;color:var(--mu);margin-top:8px"></div>
    </div>`);
}

function saveGhCfg(){
  localStorage.setItem('gh_owner', el('gh_owner_inp').value.trim());
  localStorage.setItem('gh_repo',  el('gh_repo_inp').value.trim());
  localStorage.setItem('gh_token', el('gh_token_inp').value.trim());
  setHtml('gh-status','✓ Gespeichert.');
}

async function testGhCfg(){
  saveGhCfg();
  const cfg=ghCfg();
  if(!cfg.token||!cfg.owner||!cfg.repo){setHtml('gh-status','⚠ Bitte alle Felder ausfüllen.');return;}
  setHtml('gh-status','Verbinde...');
  try{
    const r=await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/activity_log.json`,
      {headers:{'Authorization':'token '+cfg.token,'Accept':'application/vnd.github.v3+json'}});
    if(r.ok||r.status===404){setHtml('gh-status','✓ Verbindung OK.');}
    else{setHtml('gh-status',`✗ Fehler ${r.status}: ${r.statusText}`);}
  }catch(e){setHtml('gh-status','✗ Netzwerkfehler: '+e.message);}
}

function downloadAll(){
  const all={};
  for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);try{all[k]=JSON.parse(localStorage.getItem(k));}catch{all[k]=localStorage.getItem(k);}}
  const json=JSON.stringify(all,null,2);
  const blob=new Blob([json],{type:'application/json'});
  // Try Web Share API first (works on Android Chrome for saving to files)
  if(navigator.share&&navigator.canShare&&navigator.canShare({files:[new File([blob],'goal_tracker_backup.json',{type:'application/json'})]})){
    navigator.share({files:[new File([blob],'goal_tracker_backup.json',{type:'application/json'})],title:'Goal Tracker Backup'});
  } else {
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='goal_tracker_backup.json';a.click();
  }
}

function importData(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);let count=0;
        for(const[k,v]of Object.entries(data)){
          localStorage.setItem(k,typeof v==='string'?v:JSON.stringify(v));count++;
        }
        alert(count+' Einträge importiert. Seite wird neu geladen.');location.reload();
      }catch(ex){alert('Importfehler: '+ex.message);}
    };reader.readAsText(file);
  };inp.click();
}
