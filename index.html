<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Golf Tracker">
<meta name="theme-color" content="#15803d">
<link rel="apple-touch-icon" href="icon-192.svg">
<link rel="manifest" href="manifest.json">
<title>Golf Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--sf:#161b22;--s2:#1c2330;
  --b1:rgba(255,255,255,0.08);--b2:rgba(255,255,255,0.18);
  --tx:#e6edf3;--mu:#7d8590;--ac:#c8a96e;
  --gn:#4ade80;--gn2:#86efac;--ye:#fbbf24;--rd:#f87171;--bl:#60a5fa;--pu:#c084fc;
}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:15px;color:var(--tx);background:var(--bg);padding-bottom:84px;min-height:100vh}
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--sf);border-top:1px solid var(--b1);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nb{flex:1;padding:10px 2px 8px;border:none;background:none;color:var(--mu);font-size:9px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
.nb.on{color:var(--ac)}
.nb svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:2}
.hdr{padding:14px 16px 10px;border-bottom:1px solid var(--b1)}
.hdr h1{font-size:18px;font-weight:700}
.hdr p{font-size:12px;color:var(--mu);margin-top:2px}
.pg{display:none;padding:12px 16px}
.pg.on{display:block}
.card{background:var(--sf);border:1px solid var(--b1);border-radius:12px;padding:14px 16px;margin-bottom:12px}
.ct{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--mu);margin-bottom:10px;font-weight:600}
.cr{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--b1)}
.cr:last-child{border-bottom:none}
.cr input[type=checkbox]{width:18px;height:18px;flex-shrink:0;margin-top:2px;accent-color:var(--ac)}
.cl{flex:1;font-size:14px;line-height:1.4}
.cl.done{color:var(--mu);text-decoration:line-through}
.bw{font-size:11px;padding:2px 7px;border-radius:6px;background:rgba(251,191,36,.12);color:var(--ye);flex-shrink:0}
.bi{font-size:11px;padding:2px 7px;border-radius:6px;background:rgba(96,165,250,.12);color:var(--bl);flex-shrink:0}
.bp{font-size:11px;padding:2px 7px;border-radius:6px;background:rgba(74,222,128,.15);color:var(--gn);flex-shrink:0}
.fpill{padding:6px 11px;border:1px solid var(--b2);border-radius:999px;background:var(--s2);color:var(--mu);font-size:12px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.fpill.sel{background:rgba(74,222,128,.18);border-color:var(--gn);color:var(--gn);font-weight:600}
.bd{font-size:11px;padding:2px 7px;border-radius:6px;background:rgba(248,113,113,.15);color:var(--rd);flex-shrink:0}
.good{color:var(--gn)}.warn{color:var(--ye)}.bad{color:var(--rd)}
select,input[type=text],input[type=number],input[type=date],textarea{
  width:100%;padding:9px 12px;border:1px solid var(--b2);border-radius:8px;
  background:var(--s2);color:var(--tx);font-size:14px;font-family:inherit;-webkit-appearance:none}
textarea{resize:vertical;min-height:60px}
.fr{margin-bottom:10px}
.fr label{display:block;font-size:11px;color:var(--mu);margin-bottom:4px;text-transform:uppercase;letter-spacing:.8px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.dl{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--mu);margin:10px 0 6px;padding-bottom:4px;border-bottom:1px solid var(--b1)}
.btn{padding:10px 16px;border:1px solid var(--b2);border-radius:8px;background:transparent;color:var(--tx);cursor:pointer;font-size:14px;font-weight:600}
.btnp{background:var(--ac);color:#0d1117;border-color:transparent}
.btnb{background:var(--bl);color:#0d1117;border-color:transparent}
.btns{padding:6px 12px;font-size:12px;border-radius:6px}
.btnd{color:var(--rd);border-color:rgba(248,113,113,.3)}
.rbtns{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.dstrip{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none}
.dstrip::-webkit-scrollbar{display:none}
.dbtn{flex-shrink:0;padding:6px 10px;border:1px solid var(--b1);border-radius:8px;background:transparent;color:var(--mu);cursor:pointer;text-align:center;min-width:46px}
.dbtn.on{background:var(--ac);color:#0d1117;border-color:transparent;font-weight:700}
.dbtn.tod{border-color:var(--ac)}
.ddot{width:5px;height:5px;border-radius:50%;margin:3px auto 0;background:var(--b1)}
.dbtn.has .ddot{background:var(--gn)}
/* STATUS BARS */
.sbars{margin-bottom:14px}
.srow{margin-bottom:10px}
.slbl{font-size:10px;color:var(--mu);margin-bottom:5px;text-transform:uppercase;letter-spacing:1px;font-weight:600;display:flex;justify-content:space-between;align-items:center}
.slots{display:flex;gap:5px}
.slot{flex:1;height:26px;border-radius:6px;border:1px solid var(--b2);background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--mu);text-transform:uppercase;letter-spacing:.4px;transition:all .2s;position:relative;overflow:hidden}
.slot.d1{background:rgba(134,239,172,.2);border-color:#86efac;color:#86efac}
.slot.d2{background:rgba(74,222,128,.35);border-color:#4ade80;color:#4ade80;font-weight:700}
/* WEEK BAR ROWS */
.wbar-row{margin-bottom:12px}
.wbar-label{font-size:11px;color:var(--mu);margin-bottom:5px;text-transform:uppercase;letter-spacing:1px;font-weight:600;display:flex;justify-content:space-between}
.wbar-slots{display:flex;gap:4px}
.wslot{flex:1;height:32px;border-radius:6px;border:1px solid var(--b2);background:var(--s2);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;user-select:none;position:relative}
.wslot .wday{font-size:8px;color:var(--mu);line-height:1}
.wslot .wval{font-size:9px;line-height:1;margin-top:2px}
.wslot.done{background:rgba(74,222,128,.25);border-color:#4ade80}
.wslot.done .wday{color:#4ade80}
.wslot.done .wval{color:#4ade80}
.wslot.extra{background:rgba(74,222,128,.45);border-color:#4ade80}
.wslot.extra .wday{color:#4ade80}
.wslot.extra .wval{color:#4ade80;font-weight:700}
.wslot.today-slot{border-color:var(--ac)}
.wslot.alc1{background:rgba(255,220,50,.2);border-color:#ffd932}
.wslot.alc1 .wday,.wslot.alc1 .wval{color:#ffd932}
.wslot.alc2{background:rgba(255,185,0,.25);border-color:#ffb900}
.wslot.alc2 .wday,.wslot.alc2 .wval{color:#ffb900}
.wslot.alc3{background:rgba(255,130,0,.25);border-color:#ff8200}
.wslot.alc3 .wday,.wslot.alc3 .wval{color:#ff8200}
.wslot.alc4{background:rgba(235,80,0,.28);border-color:#eb5000}
.wslot.alc4 .wday,.wslot.alc4 .wval{color:#eb5000}
.wslot.alc5{background:rgba(248,113,113,.3);border-color:#f87171}
.wslot.alc5 .wday,.wslot.alc5 .wval{color:#f87171}
/* SESSION LOG */
.sitem{background:var(--s2);border:1px solid var(--b1);border-radius:8px;padding:8px 10px;margin-top:6px;display:flex;justify-content:space-between;align-items:flex-start;gap:6px}
.sitem-txt{flex:1;font-size:13px;line-height:1.4}
.sitem-del{color:var(--rd);border:none;background:none;font-size:16px;cursor:pointer;padding:0;flex-shrink:0;line-height:1}
.earea{background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:10px;margin-top:6px}
.earea label{font-size:11px;color:var(--mu);display:block;margin-bottom:4px}
/* ROUNDS */
.rrow{padding:10px 0;border-bottom:1px solid var(--b1)}
.rrow:last-child{border-bottom:none}
.mgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.mc{background:var(--sf);border:1px solid var(--b1);border-radius:10px;padding:10px;text-align:center}
.mv{font-size:20px;font-weight:700}
.ml{font-size:10px;color:var(--mu);margin-top:3px}
.ebox{background:var(--s2);border:1px solid var(--b1);border-radius:8px;padding:12px;font-size:11px;font-family:monospace;white-space:pre-wrap;max-height:280px;overflow-y:auto;margin-top:10px;line-height:1.5}
/* HOLE BOXES */
.hole-box{background:var(--s2);border:1px solid var(--b1);border-radius:10px;padding:10px 12px;margin-bottom:8px}
.hole-hdr{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--ye);font-weight:600;margin-bottom:8px}
.hole-r1{display:flex;gap:10px;align-items:flex-end;margin-bottom:8px}
.hole-r2{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px}
.hole-r3{display:flex;gap:5px;flex-wrap:wrap}
.hole-nf{display:flex;flex-direction:column;gap:3px}
.hole-lbl{font-size:10px;color:var(--ye);text-transform:uppercase;letter-spacing:.5px}
.hole-num{width:56px;padding:6px 4px;font-size:20px;font-weight:700;text-align:center;border:1px solid var(--b2);border-radius:7px;background:var(--bg);color:var(--tx);-webkit-appearance:none;-moz-appearance:textfield}
.hole-num::-webkit-inner-spin-button,.hole-num::-webkit-outer-spin-button{-webkit-appearance:none}
.hole-toggle{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:5px 8px;border:1px solid var(--b2);border-radius:6px;cursor:pointer;background:var(--bg);color:var(--tx);-webkit-tap-highlight-color:transparent;user-select:none}
.hole-toggle input{width:17px;height:17px;accent-color:var(--ac)}
.hole-toggle.good{border-color:#16a34a;color:#15803d}
.hole-toggle.good input{accent-color:#16a34a}
.hole-toggle.bad{border-color:#dc2626;color:#b91c1c}
.hole-toggle.bad input{accent-color:#dc2626}
/* PRACTICE PILLS */
.pills{display:flex;flex-wrap:wrap;gap:8px}
.ppill{position:relative;padding:10px 14px;border:1px solid var(--b2);border-radius:999px;background:var(--s2);color:var(--tx);font-size:14px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.ppill.on{background:rgba(74,222,128,.18);border-color:var(--gn);color:var(--gn2);font-weight:600}
.ppill .pc{margin-left:6px;font-size:11px;background:rgba(255,255,255,.12);border-radius:999px;padding:1px 6px;color:var(--mu)}
.ppill.on .pc{color:var(--gn2);background:rgba(74,222,128,.25)}
</style>
</head>
<body>
<div class="hdr"><h1>⛳ Golf Tracker</h1><p id="hdate"></p></div>
<div id="pg-today" class="pg on"></div>
<div id="pg-week" class="pg"></div>
<div id="pg-rounds" class="pg"></div>
<div id="pg-analytics" class="pg"></div>
<div id="pg-export" class="pg"></div>
<nav class="nav">
  <button class="nb on" onclick="go('today')" id="nb-today"><svg viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>Practice</button>
  <button class="nb" onclick="go('rounds')" id="nb-rounds"><svg viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>Rounds</button>
  <button class="nb" onclick="go('analytics')" id="nb-analytics"><svg viewBox="0 0 24 24"><path d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4v16"/></svg>Trends</button>
  <button class="nb" onclick="go('export')" id="nb-export"><svg viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>Export</button>
</nav>
<script>
const DAYFULL=['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
const DAYS=['So','Mo','Di','Mi','Do','Fr','Sa'];

const LOCATIONS=[
  {id:'putting_green',label:'Putting Green',col:'#c084fc'},
  {id:'sga',          label:'SGA',          col:'#4ade80'},
  {id:'range',        label:'Range',        col:'#60a5fa'},
  {id:'on_course',    label:'On Course',    col:'#c8a96e'},
];
const PRACTICE_TYPES=[
  'Putting','Chipping','Up & Downs','Pitching','Bunkers','Scoring','Long Game','Driver',
];
// Shared discipline taxonomy (Astrid 2026-06-16) — used by on-course-practice focus
// AND (later) range/practice pills, so subsumption is per-discipline.
const PRACTICE_FOCI=[
  {id:'driving',  label:'Driving',   hint:'off the tee'},
  {id:'long_game',label:'Long Game', hint:'between driving & scoring (long irons/woods)'},
  {id:'scoring',  label:'Scoring',   hint:'7-iron or shorter (approach)'},
  {id:'bunkers',  label:'Bunkers',   hint:'e.g. greenside bunker every hole'},
  {id:'putting',  label:'Putting',   hint:'e.g. lag putt every hole'},
  {id:'updowns',  label:'Up & Downs',hint:'pitch/chip/putt scramble — 9 in 27'},
];
const fociLabels=ids=>(ids||[]).map(id=>{const f=PRACTICE_FOCI.find(x=>x.id===id);return f?f.label:id;});
// Practice pills = the 6 disciplines + Stretching (mobility). Tap to log; green = done that day.
const PRACTICE_PILLS=[...PRACTICE_FOCI];
const ROUND_OPTS=[
  {id:'comp18',   label:'Competitive 18 Hole',type:'game',slot:'Round'},
  {id:'comp9',    label:'Competitive 9 Hole', type:'game',slot:'Round'},
  {id:'match',    label:'Match',              type:'game',slot:'Round'},
  {id:'pracround',label:'Practice Round',     type:'game',slot:'Round'},
];
function catCol(catId){
  const loc=LOCATIONS.find(l=>l.id===catId);
  if(loc)return loc.col;
  if(catId==='round')return'#c8a96e';
  if(catId==='putt')return'#c084fc';
  return'#888';
}
function typeToId(t){return t.toLowerCase().replace(/[^a-z]/g,'_');}
// legacy CATS alias so old stored sessions still render correctly
const CATS=[
  {id:'round',       label:'Round',          col:'#c8a96e'},
  {id:'range',       label:'Range',          col:'#60a5fa'},
  {id:'sga',         label:'SGA',            col:'#4ade80'},
  {id:'putt',        label:'Putting/Chipping',col:'#c084fc'},
  {id:'putting_green',label:'Putting Green', col:'#c084fc'},
  {id:'on_course',   label:'On Course',      col:'#c8a96e'},
];
const GLASSES=6;

// ── STORAGE ──────────────────────────────────────────────────────
function sg(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}}
function ss(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function ld(dkey){return sg('d_'+dkey)||{};}
function sd(dkey,data){ss('d_'+dkey,data);}
function getSess(dkey){return sg('s_'+dkey)||[];}
function saveSess(dkey,arr){ss('s_'+dkey,arr);}

// ── SUPABASE SYNC ─────────────────────────────────────────────────
const SB_URL='https://ykbabwkyojlwculjmbrw.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlrYmFid2t5b2psd2N1bGptYnJ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MTg0NzMsImV4cCI6MjA5MjA5NDQ3M30.4lYnVcgv1o9OvXGMtrbjwKhXZ8Yybqln08aci_ZM9mI';

async function sbReq(path,method,body){
  if(!SB_URL||SB_URL.startsWith('YOUR_'))return;
  try{
    await fetch(SB_URL+'/rest/v1/'+path,{
      method:method||'POST',
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates,return=minimal'},
      body:body!=null?JSON.stringify(body):undefined,
    });
  }catch(e){console.warn('Supabase sync:',e);}
}

async function sbGet(path){
  if(!SB_URL||SB_URL.startsWith('YOUR_'))return[];
  try{
    const r=await fetch(SB_URL+'/rest/v1/'+path,{
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY},
    });
    if(!r.ok)return[];
    return await r.json();
  }catch(e){console.warn('Supabase load:',e);return[];}
}

async function loadFromSupabase(){
  const startDate=new Date();startDate.setDate(startDate.getDate()-120);
  const startDk=dk(startDate);
  const[rounds,habits,cardio,sessions,vacations]=await Promise.all([
    sbGet('golf_rounds?order=date.desc&limit=500'),
    sbGet('daily_habits?date=gte.'+startDk+'&order=date.desc'),
    sbGet('cardio_gym?date=gte.'+startDk+'&order=date.desc'),
    sbGet('golf_sessions?date=gte.'+startDk+'&order=date.asc'),
    sbGet('vacation_weeks?week_start=gte.'+startDk),
  ]);
  if(rounds.length)ss('rounds',rounds.map(r=>({date:r.date,course:r.course||'',comp:r.comp||false,practice:r.practice||false,practiceFocus:r.practice_focus||[],practiceDrill:r.practice_drill||null,notes:r.notes||'',holesData:r.holes_data||null})));
  for(const h of habits){
    const d=h.date;
    if(h.water_glasses!=null)ss('wat_'+d,h.water_glasses>=1?1:0);
    if(h.mirror!=null)ss('wbar_mirror_'+d,h.mirror);
    if(h.protein!=null)ss('wbar_protein_'+d,h.protein);
    if(h.stretch!=null)ss('wbar_stretch_'+d,h.stretch);
    if(h.alcohol!=null)ss('wbar_alc_'+d,h.alcohol);
  }
  for(const c of cardio){
    if(c.type==='cardio')ss('wbar_cardio_'+c.slot_index+'_'+c.date,c.value);
    if(c.type==='gym')ss('wbar_fit_'+c.slot_index+'_'+c.date,c.value);
  }
  const sessMap={};
  for(const s of sessions){
    if(!sessMap[s.date])sessMap[s.date]=[];
    sessMap[s.date].push({cat:s.cat,optId:s.opt_id,type:s.type,slot:s.slot,label:s.label,ev:s.extra_value});
  }
  for(const[date,list]of Object.entries(sessMap))ss('s_'+date,list);
  for(const v of vacations)ss('vac_'+v.week_start,true);
  const wnotes=await sbGet('weekly_notes?week_start=eq.'+dk(wmon(new Date())));
  ss('coach_note',wnotes.length?(wnotes[0].note||''):'');
}

async function syncDayHabits(dkey){
  // Golf-owned daily habits ONLY (mirror, stretch). protein / water / alcohol are owned by
  // the diary now — never write them here or the upsert would clobber the diary's values.
  await sbReq('daily_habits','POST',{
    date:dkey,
    mirror:getWbar('mirror',dkey),
    stretch:getWbar('stretch',dkey),
  });
}

async function syncCardioGym(dkey){
  const rows=[];
  for(let i=0;i<4;i++)rows.push({date:dkey,type:'cardio',slot_index:i,value:getWbar('cardio_'+i,dkey)});
  for(let i=0;i<3;i++)rows.push({date:dkey,type:'gym',slot_index:i,value:getWbar('fit_'+i,dkey)});
  await sbReq('cardio_gym','POST',rows);
}

async function syncGolfSessions(dkey){
  await sbReq('golf_sessions?date=eq.'+dkey,'DELETE');
  const sess=getSess(dkey);
  if(sess.length>0)await sbReq('golf_sessions','POST',sess.map(s=>({date:dkey,cat:s.cat,opt_id:s.optId,type:s.type,slot:s.slot,label:s.label,extra_value:s.ev})));
}

async function syncRounds(){
  const rounds=sg('rounds')||[];
  await sbReq('golf_rounds?date=gte.2020-01-01','DELETE');
  if(rounds.length>0)await sbReq('golf_rounds','POST',rounds.map(r=>({date:r.date,course:r.course||'',comp:r.comp||false,practice:r.practice||false,practice_focus:r.practiceFocus||[],practice_drill:r.practiceDrill||null,notes:r.notes||'',holes_data:r.holesData||null})));
}

async function syncVacation(weekDkey,isVac){
  if(isVac)await sbReq('vacation_weeks','POST',{week_start:weekDkey});
  else await sbReq('vacation_weeks?week_start=eq.'+weekDkey,'DELETE');
}

// ── DATE UTILS ───────────────────────────────────────────────────
function today(){return new Date();}
function dk(d){return d.toISOString().slice(0,10);}
function dkToday(){return dk(today());}
function wmon(d){const x=new Date(d);const day=x.getDay();x.setDate(x.getDate()-day+(day===0?-6:1));return x;}
function weekDays(){
  const mon=wmon(today());const days=[];
  for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);days.push({d,dkey:dk(d),dow:d.getDay(),isToday:dk(d)===dkToday()});}
  return days;
}
function daysElapsed(){
  // how many days of the week have passed including today (Mon=1..Sun=7)
  const dow=today().getDay();
  return dow===0?7:dow; // getDay: 0=Sun
  // Mon=1,Tue=2,...,Sat=6,Sun=0 → we want Mon=1..Sun=7
  // wmon starts Monday, so elapsed = dow===0?7:dow
}

function getWbar(barId,dkey){return sg('wbar_'+barId+'_'+dkey)||0;}
function setWbar(barId,dkey,val){ss('wbar_'+barId+'_'+dkey,val);}

// Long-press-to-undo: touchstart starts 500ms timer; click is suppressed if timer fired
let _lp={t:null,f:false};
function lpS(fn){_lp.f=false;clearTimeout(_lp.t);_lp.t=setTimeout(()=>{_lp.f=true;try{navigator.vibrate(40);}catch(e){}fn();},500);}
function lpE(){clearTimeout(_lp.t);}
function lpC(fn){if(!_lp.f)fn();}

function undoWbar(barId,dkey){
  const cur=getWbar(barId,dkey);if(cur<=0)return;
  setWbar(barId,dkey,cur-1);
  if(barId.startsWith('cardio_')||barId.startsWith('fit_'))syncCardioGym(dkey);
  else syncDayHabits(dkey);
  go(CUR);
}
function undoCardio(slotIdx){
  const barId='cardio_'+slotIdx;
  for(const day of [...weekDays()].reverse()){const cur=getWbar(barId,day.dkey);if(cur>0){setWbar(barId,day.dkey,cur-1);syncCardioGym(day.dkey);go(CUR);return;}}
}
function undoFit(slotIdx){
  const barId='fit_'+slotIdx;
  for(const day of [...weekDays()].reverse()){const cur=getWbar(barId,day.dkey);if(cur>0){setWbar(barId,day.dkey,cur-1);syncCardioGym(day.dkey);go(CUR);return;}}
}
function undoGlass(dkey){ss('wat_'+dkey,0);syncDayHabits(dkey);go(CUR);}

function tapWbar(barId,dkey,maxVal){
  maxVal=maxVal||2;
  const cur=getWbar(barId,dkey);
  setWbar(barId,dkey,cur>=maxVal?0:cur+1);
  if(barId.startsWith('cardio_')||barId.startsWith('fit_'))syncCardioGym(dkey);
  else syncDayHabits(dkey);
  go(CUR);
}

// slots = [{dkey, dow, isToday}]
// barId = string key

// colorFn(val, slotIdx, allVals) => css class
function wbarHtml(barId,days,title,note,maxVal,colorFn,showVal){

// Alcohol bar (special coloring per cumulative count)
function alcBarHtml(days){

  h+=`<div class="wbar-label"><span>🍷 Alcohol</span>${warn}</div>`;

  // determine color: first 3 neutral/green, 4th orange, 5th+ red

  for(const day of days){

  if(n===1) return {bg:'rgba(249,115,22,0.2)',border:'#f97316',text:'#f97316'};

function getLocCounts(){
  const c={putting_green:0,sga:0,range:0,on_course:0};
  for(const day of weekDays()){
    for(const s of getSess(day.dkey)){
      if(s.cat==='putt'||s.cat==='putting_green')c.putting_green++;
      else if(c.hasOwnProperty(s.cat))c[s.cat]++;
    }
  }
  return c;

// Auto-compute Round slot from rounds tab
function roundSlotDone(){
  const rounds=sg('rounds')||[];
  const mon=wmon(today());const monDk=dk(mon);
  const total=rounds.filter(r=>{
    if(!r.date)return false;
    return dk(wmon(new Date(r.date+'T12:00:00')))===monDk;
  }).reduce((s,r)=>{
    if(r.holesData)return s+deriveRoundStats(r.holesData).n;
    return s+Number(r.holes||18);
  },0);
  return total>=9;
}

function addSess(dkey){
  const catId=el('cs_'+dkey)?el('cs_'+dkey).value:'';
  const typeId=el('os_'+dkey)?el('os_'+dkey).value:'';
  if(!catId||!typeId)return;
  let sessObj;
  if(catId==='round'){
    const opt=ROUND_OPTS.find(o=>o.id===typeId);
    if(!opt)return;
    sessObj={cat:'round',optId:opt.id,type:opt.type,slot:'Round',label:opt.label,ev:''};
  } else {
    const modeEl=el('ms_'+dkey);
    const mode=modeEl?modeEl.value:'drill';
    const ev=(el('ei_'+dkey)?el('ei_'+dkey).value:'').trim();
    const typeName=PRACTICE_TYPES.find(t=>typeToId(t)===typeId)||typeId;
    const modeLabel=mode.charAt(0).toUpperCase()+mode.slice(1);
    const label=`${typeName} — ${modeLabel}`;
    sessObj={cat:catId,optId:typeId+'_'+mode,type:mode,slot:catId,label,ev};
  }
  const sess=getSess(dkey);
  sess.push(sessObj);
  saveSess(dkey,sess);
  syncGolfSessions(dkey);
  logActivity(dkey,'golf');
  go(CUR);
}

function ghCfg(){
  return{
    token: localStorage.getItem('gh_token')||'',
    owner: localStorage.getItem('gh_owner')||'',
    repo:  localStorage.getItem('gh_repo')||'',
  };
}

async function logActivity(date,activity){
  const cfg=ghCfg();
  if(!cfg.token||!cfg.owner||!cfg.repo)return;
  const url=`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/activity_log.json`;
  const headers={'Authorization':'token '+cfg.token,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'};
  try{
    const resp=await fetch(url,{headers});
    let entries=[],sha=null;
    if(resp.ok){
      const data=await resp.json();
      sha=data.sha;
      entries=JSON.parse(atob(data.content.replace(/\n/g,'')));
    }
    if(entries.some(e=>e.date===date&&e.activity===activity))return; // already logged
    entries.push({date,activity});
    entries.sort((a,b)=>a.date.localeCompare(b.date));
    const body={message:`log: ${activity} on ${date}`,content:btoa(unescape(encodeURIComponent(JSON.stringify(entries,null,2))))};
    if(sha)body.sha=sha;
    await fetch(url,{method:'PUT',headers,body:JSON.stringify(body)});
    console.log(`Logged: ${activity} on ${date}`);
  }catch(e){console.warn('Activity log error:',e);}
}

let rounds=[],editIdx=null;

function deriveRoundStats(hd){
  const Z={n:0,delta:null,gir:null,fw:null,ud:null,p3:null,db:null,b5:null,pen:null,bs:null,drvS:null,drvX:null,appM:null,appW:null,appX:null,shC:null,putts:null,penStk:null,bunk:null,hero:null};
  if(!hd||!hd.length)return Z;
  const played=hd.filter(h=>h.par!=null&&h.par!==''&&h.score!=null&&h.score!=='');
  const n=played.length;
  if(!n)return Z;
  const isNew=played.some(h=>h.drive!==undefined||h.app!==undefined||h.short!==undefined||h.trbl!==undefined||h.putts!==undefined);
  const delta=played.reduce((s,h)=>s+(Number(h.score)-Number(h.par)),0);
  const gir=played.filter(h=>h.gir).length;
  const db=played.filter(h=>Number(h.score)>=Number(h.par)+2).length;
  const b5=played.filter(h=>Number(h.par)===5&&Number(h.score)>=6).length;
  const o={...Z,n,delta,gir,db,b5};
  if(isNew){
    const dv=h=>String(h.drive||'').toLowerCase(),ap=h=>String(h.app||'').toLowerCase(),sh=h=>String(h.short||'').toLowerCase(),tr=h=>String(h.trbl||'').trim().toUpperCase();
    o.drvS=played.filter(h=>dv(h)==='s').length;
    o.drvX=played.filter(h=>dv(h)==='x').length;
    o.appM=played.filter(h=>ap(h)==='m').length;
    o.appW=played.filter(h=>ap(h)==='w').length;
    o.appX=played.filter(h=>ap(h)==='x').length;
    o.shC=played.filter(h=>sh(h)==='c').length;
    // Fault-only card (2026-07-04): a successful save is DERIVED (missed green, still
    // par or better = scrambled); explicit ✓/ud entries from earlier cards still count.
    o.ud=played.filter(h=>!h.gir&&(['ud','u','✓'].includes(sh(h))||Number(h.score)<=Number(h.par))).length;
    // hero-shot tell: green-attack died AND a penalty stroke on the same hole
    o.hero=played.filter(h=>ap(h)==='x'&&['W','O','U'].includes(tr(h))).length;
    o.putts=played.reduce((s,h)=>s+(Number(h.putts)||0),0)||null;
    o.p3=played.filter(h=>Number(h.putts)>=3).length;
    o.penStk=played.filter(h=>['W','O','U'].includes(tr(h))).length;
    o.bunk=played.filter(h=>['FB','GB'].includes(tr(h))).length;
    o.pen=o.penStk;
  }else{
    o.fw=played.filter(h=>h.fw&&Number(h.par)!==3).length;
    o.ud=played.filter(h=>h.ud&&!h.gir).length;
    o.p3=played.filter(h=>h.p3).length;
    o.pen=played.filter(h=>h.p&&String(h.p).trim()).length;
    o.bs=played.filter(h=>h.b7).length;
  }
  return o;
}

function getRoundStats(r){
  if(r.holesData){
    const s=deriveRoundStats(r.holesData);
    return{...s,holes:s.n};
  }
  // legacy format
  return{
    n:Number(r.holes||18),holes:Number(r.holes||18),
    delta:nn(r.delta)?Number(r.delta):null,
    gir:nn(r.gir)?Number(r.gir):null,
    fw:nn(r.fw)?Number(r.fw):null,
    ud:nn(r.ud)?Number(r.ud):null,
    p3:nn(r.p3)?Number(r.p3):null,
    db:nn(r.db)?Number(r.db):null,
    b5:nn(r.b5)?Number(r.b5):null,
    pen:nn(r.pen)?Number(r.pen):null,
    bs:nn(r.bs)?Number(r.bs):null,
    drvS:null,drvX:null,appM:null,appW:null,appX:null,shC:null,putts:null,penStk:null,bunk:null,hero:null
  };
}

let roundMode='select'; // 'select' | 'scan' | 'manual'
let scanFiles=[null,null];    // [{base64,mimeType}, null] — index 0=front9, 1=back9
let scanPreviews=[null,null]; // [dataURL, null]

function roundStatsHtml(){
  if(!rounds.length)return'';
  const sc=(v,n)=>(v!=null&&n>0)?v*18/n:null;
  const rs=rounds.map(r=>{const s=getRoundStats(r);return {...s,comp:!!r.comp};});
  const mean=a=>a.length?a.reduce((x,y)=>x+y,0)/a.length:null;
  const f1=v=>v==null?'—':(Math.round(v*10)/10).toFixed(1);
  const sg=v=>v==null?'':((v>0?'+':'')+(Math.round(v*10)/10).toFixed(1));
  const fS=v=>v==null?'—':((v>0?'+':'')+(Math.round(v*10)/10).toFixed(1));
  const sD=g=>mean(rs.filter(g).filter(x=>x.delta!=null&&x.n>=9).map(x=>sc(x.delta,x.n)));
  const dAll=sD(()=>true),dComp=sD(x=>x.comp),dNorm=sD(x=>!x.comp);
  const M=[
    {l:'Doubles+',g:x=>x.db,bad:1},
    {l:'3-putts',g:x=>x.p3,bad:1},
    {l:'Penalties',g:x=>x.penStk!=null?x.penStk:x.pen,bad:1},
    {l:'Drives lost',g:x=>x.drvX,bad:1},
    {l:'App faults',g:x=>(x.appM!=null||x.appW!=null||x.appX!=null)?((x.appM||0)+(x.appW||0)+(x.appX||0)):null,bad:1},
    {l:'Short chokes',g:x=>x.shC,bad:1},
    {l:'GIR',g:x=>x.gir,bad:0},
    {l:'Up & downs',g:x=>x.ud,bad:0}
  ];
  const rows=M.map(m=>{
    const pool=ff=>{const xs=rs.filter(x=>ff(x)&&m.g(x)!=null&&x.n>0);const H=xs.reduce((s,x)=>s+x.n,0);return H?xs.reduce((s,x)=>s+m.g(x),0)*18/H:null;};
    const cv=pool(x=>x.comp),nv=pool(x=>!x.comp),av=pool(()=>true);
    const delta=(cv!=null&&nv!=null)?cv-nv:null;
    return {l:m.l,bad:m.bad,cv:cv,nv:nv,av:av,delta:delta};
  }).filter(r=>r.av!=null);
  const bad=rows.filter(r=>r.bad), good=rows.filter(r=>!r.bad);
  const workOn=bad.filter(r=>r.delta!=null).sort((a,b)=>b.delta-a.delta)[0]||bad.slice().sort((a,b)=>b.av-a.av)[0];
  const resilient=bad.filter(r=>r.delta!=null&&r.delta<=0.3).sort((a,b)=>a.delta-b.delta)[0];
  const strong=good.slice().sort((a,b)=>b.av-a.av)[0];
  const carrot=resilient||strong;
  let h=`<div class="mgrid">
    <div class="mc"><div class="mv">${fS(dAll)}</div><div class="ml">Ø /18</div></div>
    <div class="mc"><div class="mv">${fS(dComp)}</div><div class="ml">Ø Comp /18</div></div>
    <div class="mc"><div class="mv">${fS(dNorm)}</div><div class="ml">Ø Social /18</div></div>
  </div>`;
  if(workOn){
    const sub=workOn.delta!=null?`${f1(workOn.nv)} social → ${f1(workOn.cv)} comp · ${sg(workOn.delta)} under pressure`:`${f1(workOn.av)} per 18`;
    h+=`<div style="margin-top:14px;padding:11px 13px;border:1px solid rgba(220,38,38,.4);background:rgba(220,38,38,.08);border-radius:10px"><div style="font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:#dc2626;margin-bottom:3px">🎯 Work on</div><div style="font-size:15px;font-weight:700">${workOn.l}</div><div style="font-size:12px;color:var(--mu);margin-top:2px">${sub}</div></div>`;
  }
  if(carrot){
    const sub=carrot.bad?`stays steady under a card · ${sg(carrot.delta)} comp`:`${f1(carrot.av)} per 18`;
    h+=`<div style="margin-top:8px;padding:11px 13px;border:1px solid rgba(22,163,74,.4);background:rgba(22,163,74,.08);border-radius:10px"><div style="font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:#16a34a;margin-bottom:3px">💪 Doing well</div><div style="font-size:15px;font-weight:700">${carrot.l}</div><div style="font-size:12px;color:var(--mu);margin-top:2px">${sub}</div></div>`;
  }
  h+=`<div style="margin-top:14px;font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--mu);margin-bottom:6px">Per 18 — social · comp · Δ</div><div style="display:grid;grid-template-columns:1fr auto auto auto;gap:5px 12px;font-size:13px;align-items:center">`;
  rows.forEach(r=>{
    let dc='var(--mu)';
    if(r.delta!=null){const worse=r.bad?(r.delta>0.2):(r.delta<-0.2);const better=r.bad?(r.delta<-0.2):(r.delta>0.2);dc=worse?'#dc2626':(better?'#16a34a':'var(--mu)');}
    h+=`<div>${r.l}</div><div style="text-align:right;font-variant-numeric:tabular-nums">${f1(r.nv)}</div><div style="text-align:right;font-variant-numeric:tabular-nums">${f1(r.cv)}</div><div style="text-align:right;font-variant-numeric:tabular-nums;color:${dc}">${r.delta==null?'—':sg(r.delta)}</div>`;
  });
  h+=`</div>`;
  if(!rows.some(r=>r.l==='Drives lost'||r.l==='App faults'||r.l==='Short chokes'))h+=`<div style="margin-top:8px;font-size:11px;color:var(--mu)">Drive / App / Short attribution fills in as you log rounds on the new card.</div>`;
  return h;
}

// ── PHOTO SCAN ────────────────────────────────────────────────────
function startScan(){
  const apiKey=localStorage.getItem('anthropic_key')||'';
  if(!apiKey){
    alert('Bitte zuerst Anthropic API-Key in den Export-Einstellungen konfigurieren.');
    go('export');
    return;
  }
  scanFiles=[null,null];scanPreviews=[null,null];
  roundMode='scan';
  renderRounds();
}

function resizeForApi(dataUrl,cb){
  const img=new Image();
  img.onload=()=>{
    const MAX=1400;
    let w=img.width,h=img.height;
    const s=Math.min(1,MAX/Math.max(w,h));
    w=Math.round(w*s);h=Math.round(h*s);
    const c=document.createElement('canvas');
    c.width=w;c.height=h;
    c.getContext('2d').drawImage(img,0,0,w,h);
    let q=0.82,result=c.toDataURL('image/jpeg',q);
    // keep halving quality until base64 is under 3.5MB (~4.67MB raw)
    while(result.length>4700000&&q>0.3){q-=0.15;result=c.toDataURL('image/jpeg',q);}
    const kb=Math.round(result.length*0.75/1024);
    console.log(`Scan image: ${w}×${h}, q=${q.toFixed(2)}, ~${kb}KB`);
    cb(result,kb);
  };
  img.src=dataUrl;
}

function onScanFile(input,idx){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    resizeForApi(e.target.result,(resized,kb)=>{
      scanFiles[idx]={base64:resized.split(',')[1],mimeType:'image/jpeg',kb};
      scanPreviews[idx]=resized;
      renderRounds();
    });
  };
  reader.readAsDataURL(file);
}

async function runScan(){
  const apiKey=localStorage.getItem('anthropic_key')||'';
  const status=el('scan-status');
  if(status)status.innerHTML=`<span style="color:var(--mu)">⏳ Claude analysiert Scorecard…</span>`;
  try{
    const images=scanFiles.filter(Boolean);
    const data=await analyzeScorecard(images,apiKey);
    if(status)status.innerHTML=`<span style="color:var(--gn)">✓ Daten extrahiert – bitte überprüfen und speichern.</span>`;
    scanFiles=[null,null];scanPreviews=[null,null];
    roundMode='manual';
    renderRounds();
    setTimeout(()=>fillRoundForm(data),100);
  }catch(err){
    if(status)status.innerHTML=`<span style="color:var(--rd)">✗ Fehler: ${err.message}</span>`;
  }
}

async function analyzeScorecard(images,apiKey){
  // images = array of {base64, mimeType} — one or two (front9 / back9)
  const content=[];
  images.forEach((img,i)=>{
    if(images.length>1)content.push({type:'text',text:i===0?'Front 9 (holes 1–9):':'Back 9 (holes 10–18):'});
    content.push({type:'image',source:{type:'base64',media_type:img.mimeType,data:img.base64}});
  });
  content.push({type:'text',text:`This is a handwritten golf scorecard. Extract all data carefully.

This card is FAULT-ONLY: blank fault cells mean "fine, no fault" (that is normal and expected on most holes) — a blank is NOT missing data as long as the hole has a score.

For each hole return:
- hole: number 1-18
- par: 3, 4 or 5 (null if unreadable)
- score: strokes played (integer, null if blank)
- drive: Drive cell — "s" for s, "x" for x, "" if blank (blank = good drive; par 3s always blank). A stray tick/✓ also means "" .
- gir: green in regulation — true if the GIR cell is ticked, else false
- app: App cell — "m" for m, "w" for w, "x" for x, "" if blank (blank = fine). A stray tick/✓ also means "".
- short: Short cell — "c" for c, "" if blank (blank = fine; saves are derived from score). A stray tick/✓ or dash also means "".
- putts: number of putts written (integer, null if blank)
- trbl: Trbl cell letters exactly (W, O, U, FB or GB), or "" if blank

Also extract:
- date: "YYYY-MM-DD" format or null
- course: course name or null
- comp: Comp checkbox ticked? (true/false)
- practice: Pract checkbox ticked? (true/false)
- notes: any written notes or null

Return ONLY valid JSON, no markdown:
{"date":null,"course":null,"comp":false,"practice":false,"notes":null,"holes":[{"hole":1,"par":4,"score":5,"drive":"","gir":false,"app":"m","short":"","putts":2,"trbl":""}]}`});

  const resp=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'x-api-key':apiKey,
      'anthropic-version':'2023-06-01',
      'content-type':'application/json',
      'anthropic-dangerous-direct-browser-access':'true',
    },
    body:JSON.stringify({
      model:'claude-haiku-4-5-20251001',
      max_tokens:2048,
      messages:[{role:'user',content}]
    })
  });
  if(!resp.ok){
    const err=await resp.json().catch(()=>({}));
    throw new Error(err.error?.message||`HTTP ${resp.status}`);
  }
  const data=await resp.json();
  let raw=data.content[0].text.trim();
  if(raw.startsWith('```')){raw=raw.split('\n').slice(1,-1).join('\n');}
  return JSON.parse(raw);
}

function fillRoundForm(data){
  if(data.date)sv('rf_d',data.date);
  if(data.course)sv('rf_c',data.course);
  if(data.notes)sv('rf_n',data.notes);
  if(el('rf_co'))el('rf_co').checked=!!data.comp;
  if(el('rf_pr'))el('rf_pr').checked=!!data.practice;
  toggleFocusBlock('rf');
  const holes=data.holes||data.holesData||[];
  holes.forEach(h=>{
    const idx=(h.hole!=null?Number(h.hole)-1:null);
    if(idx==null||idx<0||idx>=18)return;
    if(el('hp_'+idx))el('hp_'+idx).value=h.par!=null?h.par:'';
    if(el('hs_'+idx))el('hs_'+idx).value=h.score!=null?h.score:'';
    if(el('hdrive_'+idx))el('hdrive_'+idx).value=h.drive||'';
    if(el('hgir_'+idx))el('hgir_'+idx).checked=!!h.gir;
    if(el('happ_'+idx))el('happ_'+idx).value=h.app||'';
    if(el('hshort_'+idx))el('hshort_'+idx).value=h.short||'';
    if(el('hputts_'+idx))el('hputts_'+idx).value=h.putts!=null?h.putts:'';
    if(el('htrbl_'+idx))el('htrbl_'+idx).value=h.trbl||'';
    onHolePar(idx);
  });
}

function subRound(){
  if(!gv('rf_d'))return;
  if(!/^\d{4}-\d{2}-\d{2}$/.test(gv('rf_d'))){alert('Datum im Format YYYY-MM-DD eingeben, z.B. 2026-04-27');return;}
  const holesData=Array.from({length:18},(_,i)=>({
    par:el('hp_'+i)?el('hp_'+i).value:'',
    score:el('hs_'+i)?el('hs_'+i).value:'',
    drive:el('hdrive_'+i)?el('hdrive_'+i).value.trim().toLowerCase():'',
    gir:el('hgir_'+i)?el('hgir_'+i).checked:false,
    app:el('happ_'+i)?el('happ_'+i).value.trim().toLowerCase():'',
    short:el('hshort_'+i)?el('hshort_'+i).value.trim().toLowerCase():'',
    putts:el('hputts_'+i)&&el('hputts_'+i).value!==''?Number(el('hputts_'+i).value):null,
    trbl:el('htrbl_'+i)?el('htrbl_'+i).value.trim().toUpperCase():'',
  }));
  const badHoles=holesData.filter(h=>h.score!==''&&(h.par===''||h.par==null));
  if(badHoles.length>0){
    const ok=confirm(badHoles.length+' Loch/Löcher haben Score aber kein Par — diese werden nicht gewertet. Trotzdem speichern?');
    if(!ok)return;
  }
  const r={date:gv('rf_d'),course:gv('rf_c'),comp:el('rf_co').checked,practice:el('rf_pr').checked,practiceFocus:getFoci('rf'),practiceDrill:(el('rf_drill')?el('rf_drill').value.trim():'')||null,notes:gv('rf_n'),holesData};

  roundMode='select';   // back to the New-Round screen so 📷 Foto stays available

}

// ── ANALYTICS ─────────────────────────────────────────────────────
function getWeekData(weeksBack){
  const t=today();const out=[];
  for(let w=weeksBack-1;w>=0;w--){
    const mon=new Date(wmon(t));mon.setDate(mon.getDate()-w*7);
    const lbl=mon.toLocaleDateString('de-AT',{day:'2-digit',month:'2-digit'});
    const wdays=[];for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);wdays.push({d,dkey:dk(d)});}
    let mirror=0,protein=0,stretch=0,watMet=0,alc=0;
    let cardio=0,fit=0,range=0,sga=0,chipputt=0,oncourse=0,sessTotal=0;
    for(const wd of wdays){
      if(getWbar('mirror',wd.dkey)>=1)mirror++;
      if(getWbar('protein',wd.dkey)>=1)protein++;
      if(getWbar('stretch',wd.dkey)>=1)stretch++;
      if((sg('wat_'+wd.dkey)||0)>=1)watMet++;
      if(getWbar('alc',wd.dkey)>=1)alc++;
      // count days (not total slot taps)
      if([0,1,2,3].some(i=>getWbar('cardio_'+i,wd.dkey)>=1))cardio++;
      if([0,1,2].some(i=>getWbar('fit_'+i,wd.dkey)>=1))fit++;
      const sess=getSess(wd.dkey);
      range+=sess.filter(s=>s.cat==='range').length;
      sga+=sess.filter(s=>s.cat==='sga').length;
      chipputt+=sess.filter(s=>s.cat==='putt'||s.cat==='putting_green').length;
      oncourse+=sess.filter(s=>s.cat==='on_course').length;
      sessTotal+=sess.length;
    }
    const rds=(sg('rounds')||[]).filter(r=>{
      if(!r.date)return false;
      return dk(wmon(new Date(r.date+'T12:00:00')))===dk(mon);
    });
    const sc18=(v,n)=>v!==null&&n>0?v*18/n:null;
    const rdStats=rds.map(r=>getRoundStats(r));
    const deltas=rdStats.filter(s=>s.delta!==null&&s.n>0).map(s=>sc18(s.delta,s.n));
    const girs=rdStats.filter(s=>s.gir!==null&&s.n>0).map(s=>sc18(s.gir,s.n));
    const uds=rdStats.filter(s=>s.ud!==null&&s.n>0).map(s=>sc18(s.ud,s.n));
    const dbs=rdStats.filter(s=>s.db!==null&&s.n>0).map(s=>sc18(s.db,s.n));
    const fws=rdStats.filter(s=>s.fw!==null&&s.n>0).map(s=>sc18(s.fw,s.n));
    const p3s=rdStats.filter(s=>s.p3!==null&&s.n>0).map(s=>sc18(s.p3,s.n));
    const avg=arr=>arr.length?(arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(1):null;
    const holes=rdStats.reduce((s,st)=>s+(st.n||0),0);
    const holesNormal=rds.reduce((a,r,i)=>r.comp?a:a+(rdStats[i].n||0),0);
    const holesComp=rds.reduce((a,r,i)=>r.comp?a+(rdStats[i].n||0):a,0);
    const isVacWeek=!!sg('vac_'+dk(mon));
    out.push({lbl,vacation:isVacWeek,mirror,protein,stretch,watMet,alc,cardio,fit,holes,holesNormal,holesComp,range,sga,chipputt,oncourse,sessTotal,
      rounds:rds.length,comp:rds.filter(r=>r.comp).length,
      avgDelta:avg(deltas),avgGir:avg(girs),avgUd:avg(uds),avgDb:avg(dbs),avgFw:avg(fws),avgP3:avg(p3s)});
  }
  return out;
}

function drawChart(id,labels,datasets,opts){
  opts=opts||{};
  const c=el(id);if(!c)return;
  const ctx=c.getContext('2d');
  const W=c.width,H=c.height;
  const p={t:12,r:32,b:28,l:32}; // both sides y-axis
  const cW=W-p.l-p.r,cH=H-p.t-p.b;
  ctx.clearRect(0,0,W,H);
  const all=datasets.flatMap(d=>d.vals.filter(v=>v!==null));
  if(!all.length){
    ctx.fillStyle='rgba(255,255,255,0.25)';ctx.font='12px sans-serif';ctx.textAlign='center';
    ctx.fillText('Noch keine Daten',W/2,H/2);return;
  }
  const mn=opts.z?0:Math.min(...all);
  const mx=Math.max(...all,(opts.z?1:mn+1));
  const rng=mx-mn||1;const n=labels.length;const step=n>1?cW/(n-1):cW;
  // grid + y-axis both sides
  ctx.lineWidth=1;
  for(let i=0;i<=4;i++){
    const y=p.t+cH*(1-i/4);
    ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.beginPath();ctx.moveTo(p.l,y);ctx.lineTo(p.l+cW,y);ctx.stroke();
    const v=mn+rng*i/4;const vStr=Number.isInteger(v)?v:v.toFixed(1);
    // left
    ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='9px sans-serif';ctx.textAlign='right';
    ctx.fillText(vStr,p.l-3,y+3);
    // right
    ctx.textAlign='left';ctx.fillText(vStr,p.l+cW+3,y+3);
  }
  // x labels
  ctx.fillStyle='rgba(255,255,255,0.35)';ctx.font='9px sans-serif';ctx.textAlign='center';
  labels.forEach((l,i)=>{if(n<=8||i%2===0)ctx.fillText(l,p.l+i*step,H-6);});
  // datasets
  for(const ds of datasets){
    if(ds.target!==undefined){
      const ty=p.t+cH*(1-(ds.target-mn)/rng);
      ctx.setLineDash([4,3]);ctx.strokeStyle=ds.col+'55';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(p.l,ty);ctx.lineTo(p.l+cW,ty);ctx.stroke();ctx.setLineDash([]);
    }
    ctx.strokeStyle=ds.col;ctx.lineWidth=2;ctx.beginPath();let first=true;
    ds.vals.forEach((v,i)=>{
      if(v===null)return;
      const x=p.l+i*step;const y=p.t+cH*(1-(Number(v)-mn)/rng);
      if(first){ctx.moveTo(x,y);first=false;}else ctx.lineTo(x,y);
    });
    ctx.stroke();
    ds.vals.forEach((v,i)=>{
      if(v===null)return;
      const x=p.l+i*step;const y=p.t+cH*(1-(Number(v)-mn)/rng);
      const isVac=opts.vacation&&opts.vacation[i];
      ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);
      ctx.fillStyle=isVac?'rgba(180,180,180,0.55)':ds.col;ctx.fill();
    });
  }
  if(opts.vacation){
    ctx.fillStyle='rgba(255,255,255,0.1)';
    const half=n>1?step/2:cW/2;
    opts.vacation.forEach((isVac,i)=>{
      if(!isVac)return;
      const cx=p.l+i*step;
      ctx.fillRect(Math.max(p.l,cx-half),p.t,Math.min(half*2,p.l+cW-Math.max(p.l,cx-half)),cH);
    });
  }
}

function drawBarChart(id,labels,datasets,opts){
  opts=opts||{};
  const c=el(id);if(!c)return;
  const ctx=c.getContext('2d');
  const W=c.width,H=c.height;
  const p={t:12,r:32,b:28,l:32};
  const cW=W-p.l-p.r,cH=H-p.t-p.b;
  ctx.clearRect(0,0,W,H);
  const n=labels.length;
  let mn,mx;
  if(opts.stacked){
    const sums=datasets[0].vals.map((_,i)=>
      datasets.reduce((s,ds)=>s+(ds.vals[i]!=null?Number(ds.vals[i]):0),0));
    mx=Math.max(...sums,1);mn=0;
  }else{
    const all=datasets.flatMap(d=>d.vals.filter(v=>v!=null)).map(Number);
    if(!all.length){
      ctx.fillStyle='rgba(255,255,255,0.25)';ctx.font='12px sans-serif';ctx.textAlign='center';
      ctx.fillText('Noch keine Daten',W/2,H/2);return;
    }
    mn=opts.z?0:Math.min(0,...all);
    mx=Math.max(...all,mn+0.5);
  }
  const rng=mx-mn||1;
  const gap=cW/n;
  for(let i=0;i<=4;i++){
    const y=p.t+cH*(1-i/4);
    ctx.lineWidth=1;ctx.strokeStyle='rgba(255,255,255,0.06)';
    ctx.beginPath();ctx.moveTo(p.l,y);ctx.lineTo(p.l+cW,y);ctx.stroke();
    const v=mn+rng*i/4;
    const vStr=Math.abs(v)<0.05?'0':(Number.isInteger(v)?v:v.toFixed(1));
    ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='9px sans-serif';
    ctx.textAlign='right';ctx.fillText(vStr,p.l-3,y+3);
    ctx.textAlign='left';ctx.fillText(vStr,p.l+cW+3,y+3);
  }
  if(mn<0&&mx>0){
    const zy=p.t+cH*(1-(-mn)/rng);
    ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(p.l,zy);ctx.lineTo(p.l+cW,zy);ctx.stroke();
  }
  if(opts.target!=null){
    const ty=p.t+cH*(1-(opts.target-mn)/rng);
    ctx.setLineDash([4,3]);ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(p.l,ty);ctx.lineTo(p.l+cW,ty);ctx.stroke();ctx.setLineDash([]);
  }
  ctx.fillStyle='rgba(255,255,255,0.35)';ctx.font='9px sans-serif';ctx.textAlign='center';
  labels.forEach((l,i)=>{if(n<=8||i%2===0)ctx.fillText(l,p.l+i*gap+gap/2,H-6);});
  const zeroY=p.t+cH*(1-(-mn)/rng);
  if(opts.stacked){
    labels.forEach((_,i)=>{
      let acc=0;
      for(const ds of datasets){
        const v=ds.vals[i]!=null?Number(ds.vals[i]):0;if(!v)continue;
        const yTop=p.t+cH*(1-(acc+v)/rng);
        const yBot=p.t+cH*(1-acc/rng);
        const cx=p.l+i*gap+gap/2;
        ctx.fillStyle=ds.col;
        ctx.fillRect(cx-gap*0.35,yTop,gap*0.7,Math.max(1,yBot-yTop));
        acc+=v;
      }
    });
  }else if(datasets.length===1){
    const ds=datasets[0];
    labels.forEach((_,i)=>{
      const v=ds.vals[i];if(v==null)return;
      const vn=Number(v);
      const cx=p.l+i*gap+gap/2;
      const y1=vn>=0?p.t+cH*(1-(vn-mn)/rng):zeroY;
      const y2=vn>=0?zeroY:p.t+cH*(1-(vn-mn)/rng);
      ctx.fillStyle=ds.col;
      ctx.fillRect(cx-gap*0.35,y1,gap*0.7,Math.max(1,y2-y1));
    });
  }else{
    const nd=datasets.length;
    const totalW=gap*0.72;
    const subW=totalW/nd;
    datasets.forEach((ds,di)=>{
      labels.forEach((_,i)=>{
        const v=ds.vals[i];if(v==null)return;
        const vn=Number(v);
        const x=p.l+i*gap+(gap-totalW)/2+di*subW;
        const y1=vn>=0?p.t+cH*(1-(vn-mn)/rng):zeroY;
        const y2=vn>=0?zeroY:p.t+cH*(1-(vn-mn)/rng);
        ctx.fillStyle=ds.col;
        ctx.fillRect(x,y1,subW-1,Math.max(1,y2-y1));
      });
    });
  }
  if(opts.vacation){
    ctx.fillStyle='rgba(255,255,255,0.1)';
    opts.vacation.forEach((isVac,i)=>{
      if(!isVac)return;
      ctx.fillRect(p.l+i*gap,p.t,gap,cH);
    });
  }
}

  },60);

function buildReport(weeks){
  const data=getWeekData(weeks);const rds=sg('rounds')||[];
  let t='╔══════════════════════════════════════╗\n║       GOLF PERFORMANCE REPORT         ║\n';
  t+=`║  ${today().toLocaleDateString('de-AT').padEnd(34)}║\n╚══════════════════════════════════════╝\n\n`;
  const last=data[data.length-1];
  t+=`LETZTE WOCHE\nRunden: ${last.rounds} (${last.comp}× Competitive)\n`;
  if(last.avgDelta!==null)t+=`Ø Score: ${Number(last.avgDelta)>0?'+':''}${last.avgDelta} zum Par\n`;
  if(last.avgGir!==null)t+=`Ø GIR: ${last.avgGir}\n`;
  t+=`Sessions: ${last.totSess} (${last.drills} Drills, ${last.games} Games)\n\n`;
  t+=`ÜBERSICHT (letzte ${weeks} Wochen)\n`;
  t+='Woche    | Rdn | Score  | GIR  | U&D  | Dbl | Sess\n---------+-----+--------+------+------+-----+-----\n';
  for(const w of data){
    const sc=w.avgDelta!==null?(Number(w.avgDelta)>0?'+':'')+w.avgDelta:'—';
    t+=`${w.lbl.padEnd(8)} | ${String(w.rounds).padEnd(3)} | ${String(sc).padEnd(6)} | ${String(w.avgGir||'—').padEnd(4)} | ${String(w.avgUd||'—').padEnd(4)} | ${String(w.avgDb||'—').padEnd(3)} | ${w.totSess}\n`;
  }
  t+='\nLETZTE RUNDEN\n';
  for(const r of rds.slice(0,8)){
    const s=getRoundStats(r);
    const sc18=(v,n)=>v!==null&&n>0?(v*18/n).toFixed(1):null;
    t+=`${r.date||'—'} ${r.course||''} ${r.comp?'[Competitive]':''}\n  ${s.n||'?'} Loch`;
    if(s.delta!==null)t+=`, ${Number(s.delta)>0?'+':''}${s.delta} Par${s.n<18?' ('+sc18(s.delta,s.n)+'/18)':''}`;
    if(s.gir!==null)t+=`, GIR:${s.gir}`;
    if(s.fw!==null)t+=`, FW:${s.fw}`;
    if(s.ud!==null)t+=`, U&D:${s.ud}`;
    if(s.p3!==null)t+=`, 3P:${s.p3}`;
    if(s.db!==null)t+=`, Dbl:${s.db}`;
    if(s.pen)t+=`, P:${s.pen}`;
    if(s.bs!==null)t+=`, B7+:${s.bs}`;
    t+='\n';if(r.notes)t+=`  → ${r.notes}\n`;
  }
  t+='\nGEWOHNHEITEN (letzte 6 Wochen)\n';
  for(const w of data.slice(-6)){
    t+=`${w.lbl}: Putten ${w.mirror}/7 | Protein ${w.protein}/7 | Stretch ${w.stretch}/7 | Wasser ${w.watMet}/7 | Cardio ${w.cardio} | Gym ${w.fit}\n`;
  }
  return t;
}

        <input type="text" id="gh_token_inp" value="${cfg.token}" placeholder="github_pat_..." autocomplete="off" style="font-family:monospace;font-size:12px"></div>
      <div class="rbtns">
        <button class="btn btnp" onclick="saveGhCfg()">💾 Speichern</button>
        <button class="btn" onclick="testGhCfg()">🔗 Verbindung testen</button>
      </div>
      <div id="gh-status" style="font-size:12px;color:var(--mu);margin-top:8px"></div>
    </div>`);
}

function saveAnthKey(){
  const k=el('anth_key_inp').value.trim();
  localStorage.setItem('anthropic_key',k);
  setHtml('anth-status',k?'✓ Gespeichert.':'Key gelöscht.');
}

function saveGhCfg(){
  localStorage.setItem('gh_owner', el('gh_owner_inp').value.trim());
  localStorage.setItem('gh_repo',  el('gh_repo_inp').value.trim());
  localStorage.setItem('gh_token', el('gh_token_inp').value.trim());
  setHtml('gh-status','✓ Gespeichert.');
}

async function testGhCfg(){
  saveGhCfg();
  const cfg=ghCfg();
  if(!cfg.token||!cfg.owner||!cfg.repo){setHtml('gh-status','⚠ Bitte alle Felder ausfüllen.');return;}
  setHtml('gh-status','Verbinde...');
  try{
    const r=await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/activity_log.json`,
      {headers:{'Authorization':'token '+cfg.token,'Accept':'application/vnd.github.v3+json'}});
    if(r.ok||r.status===404){setHtml('gh-status','✓ Verbindung OK.');}
    else{setHtml('gh-status',`✗ Fehler ${r.status}: ${r.statusText}`);}
  }catch(e){setHtml('gh-status','✗ Netzwerkfehler: '+e.message);}
}

function downloadAll(){
  const all={};
  for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);try{all[k]=JSON.parse(localStorage.getItem(k));}catch{all[k]=localStorage.getItem(k);}}
  const json=JSON.stringify(all,null,2);
  const blob=new Blob([json],{type:'application/json'});
  // Try Web Share API first (works on Android Chrome for saving to files)
  if(navigator.share&&navigator.canShare&&navigator.canShare({files:[new File([blob],'goal_tracker_backup.json',{type:'application/json'})]})){
    navigator.share({files:[new File([blob],'goal_tracker_backup.json',{type:'application/json'})],title:'Goal Tracker Backup'});
  } else {
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='goal_tracker_backup.json';a.click();
  }
}

function importData(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);let count=0;
        for(const[k,v]of Object.entries(data)){
          localStorage.setItem(k,typeof v==='string'?v:JSON.stringify(v));count++;
        }
        alert(count+' Einträge importiert. Seite wird neu geladen.');location.reload();
      }catch(ex){alert('Importfehler: '+ex.message);}
    };reader.readAsText(file);
  };inp.click();
}
