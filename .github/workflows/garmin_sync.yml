name: Garmin Sync

on:
  schedule:
    # Mon–Sat 07:00 Vienna (CEST = UTC+2) → 05:00 UTC
    - cron: "0 5 * * 1-6"
    # Sun 08:30 Vienna (CEST = UTC+2) → 06:30 UTC
    - cron: "30 6 * * 0"
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit garmin_status.js back

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install garminconnect anthropic

      - name: Run garmin_sync.py
        env:
          GARMIN_TOKENS:      ${{ secrets.GARMIN_TOKENS }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
        run: python garmin_sync.py

      - name: Commit updated garmin_status.js
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add garmin_status.js
          git diff --cached --quiet || git commit -m "chore: update garmin_status.js for $(date +%Y-%m-%d)"
          git push
