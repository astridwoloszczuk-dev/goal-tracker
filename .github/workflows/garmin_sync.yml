name: Garmin Sync

on:
  schedule:
    - cron: '0 5 * * 1'   # Monday    07:00 CEST (UTC+2 summer)
    - cron: '0 5 * * 4'   # Thursday  07:00 CEST
  workflow_dispatch:
    inputs:
      send_email:
        description: 'Send coaching email?'
        type: boolean
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit garmin_status.js back

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install garth==0.8.0 garminconnect==0.3.2 anthropic

      - name: Run garmin_sync.py
        env:
          GARMIN_TOKENS:      ${{ secrets.GARMIN_TOKENS }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_FROM:          ${{ secrets.SMTP_FROM }}
          SMTP_PASSWORD:      ${{ secrets.SMTP_PASSWORD }}
          COACHING_TO:        ${{ secrets.COACHING_TO }}
          SEND_COACHING_EMAIL: 'true'
          WEEKLY_REVIEW:      'false'
        run: python garmin_sync.py

      - name: Commit updated garmin_status.js
        # Skip commit on weekly review run — it doesn't update the JS file
        if: env.WEEKLY_REVIEW != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add garmin_status.js
          git diff --cached --quiet || git commit -m "chore: update garmin_status.js for $(date +%Y-%m-%d)"
          git push
