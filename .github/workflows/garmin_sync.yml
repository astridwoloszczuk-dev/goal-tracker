name: Garmin Sync

on:
  schedule:
    - cron: '45 5 * * 1-6'   # 07:45 Vienna (CEST/UTC+2); 06:45 in winter (CET)
    - cron: '0 22 * * 0'     # Sun 00:00 Vienna — weekly review run
  workflow_dispatch:  # manual trigger from GitHub UI or VPS

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit garmin_status.js back

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install garth==0.8.0 garminconnect==0.3.2 anthropic

      - name: Run garmin_sync.py
        env:
          GARMIN_TOKENS:      ${{ secrets.GARMIN_TOKENS }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_FROM:          ${{ secrets.SMTP_FROM }}
          SMTP_PASSWORD:      ${{ secrets.SMTP_PASSWORD }}
          COACHING_TO:        ${{ secrets.COACHING_TO }}
          # Set to "true" only for the Sunday midnight run
          WEEKLY_REVIEW:      ${{ (github.event.schedule == '0 22 * * 0') && 'true' || 'false' }}
        run: python garmin_sync.py

      - name: Commit updated garmin_status.js
        # Skip commit on weekly review run — it doesn't update the JS file
        if: env.WEEKLY_REVIEW != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add garmin_status.js
          git diff --cached --quiet || git commit -m "chore: update garmin_status.js for $(date +%Y-%m-%d)"
          git push
