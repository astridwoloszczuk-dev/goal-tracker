<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Golf Scorecard</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
@page { size: A4 portrait; margin: 0; }
body { font-family: Arial, Helvetica, sans-serif; background: white; color: #000; }

/* A4 = 2×2 grid of A4-quarter CELLS (cut lines at 105mm / 148.5mm).
   The CARD inside each cell is smaller + centred, leaving a safe gutter
   at the page edges so nothing falls in the printer's dead zone. */
.page {
  width: 210mm; height: 297mm;
  display: grid;
  grid-template-columns: 105mm 105mm;
  grid-template-rows: 148.5mm 148.5mm;
  justify-items: center;
  align-items: center;
  page-break-after: always;
}
.page:last-child { page-break-after: auto; }

.card { width: 93mm; height: 138mm; padding: 2.5mm 3mm; border: 0.4pt solid #ccc; display: flex; flex-direction: column; overflow: hidden; }

/* FRONT HEADER */
.front-title { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2mm; padding-bottom: 1.5mm; border-bottom: 1pt solid #000; flex-shrink: 0; }
.front-title-text { font-size: 8pt; font-weight: bold; letter-spacing: 0.3pt; }
.comp-wrap { display: flex; align-items: center; gap: 1.2mm; }
.comp-box  { width: 4.5mm; height: 4.5mm; border: 0.6pt solid #000; border-radius: 0.5pt; flex-shrink: 0; }
.comp-lbl  { font-size: 5.5pt; text-transform: uppercase; color: #555; }
.header-field { display: flex; align-items: baseline; gap: 2mm; margin-bottom: 1.5mm; flex-shrink: 0; }
.header-field:last-of-type { margin-bottom: 2.5mm; }
.hf-lbl  { font-size: 5.5pt; text-transform: uppercase; letter-spacing: 0.3pt; color: #555; width: 12mm; flex-shrink: 0; }
.hf-line { flex: 1; border-bottom: 0.5pt solid #000; height: 3.5mm; }

/* BACK MINI-HEADER */
.back-header { display: flex; align-items: center; justify-content: space-between; padding-bottom: 1.5mm; margin-bottom: 2mm; border-bottom: 0.8pt solid #000; flex-shrink: 0; }
.back-title { font-size: 7.5pt; font-weight: bold; }
.back-sub   { font-size: 5.5pt; color: #666; }

/* COLUMNS — # Par Score Drive GIR App Short Putts Trbl (sum 84mm, fits 87mm content) */
.col-hdr, .hole-row { display: grid; grid-template-columns: 5.5mm 7mm 11mm 10.5mm 9mm 10.5mm 10.5mm 8mm 12mm; }
.col-hdr { margin-bottom: 0.5mm; flex-shrink: 0; }
.ch { font-size: 5.2pt; text-align: center; font-weight: bold; text-transform: uppercase; letter-spacing: 0.2pt; padding: 0.8mm 0; }
.ch.left  { text-align: left; font-size: 4.5pt; color: #777; }
.ch.green { color: #15803d; }
.ch.red   { color: #b91c1c; }

.holes { display: flex; flex-direction: column; }
.hole-row { height: 10.5mm; border-bottom: 0.25pt solid #d0d0d0; align-items: center; }
.hole-row:nth-child(odd) { background: #f7f7f7; }
.cell { display: flex; align-items: center; justify-content: center; height: 100%; border-right: 0.2pt solid #e0e0e0; padding: 0 0.3mm; }
.cell:last-child { border-right: none; }
.cell.left { justify-content: flex-start; }
.hole-num { font-size: 7pt; font-weight: bold; color: #333; }

.score-box { width: 9.5mm; height: 8mm; border: 0.7pt solid #000; border-radius: 1.5pt; background: #fff; }
.pbox  { width: 5mm;  height: 7mm;   border: 0.5pt solid #999; border-radius: 1pt; background: #fff; }
.sbox  { width: 7.5mm; height: 7.5mm; border: 0.6pt solid #555; border-radius: 1pt; background: #fff; }
.sbox.green { border-color: #16a34a; background: #f0fdf4; }
.sbox.red   { border-color: #b91c1c; background: #fff7f7; }
.tbox  { width: 10mm; height: 7.5mm; border: 0.6pt solid #b91c1c; border-radius: 1pt; background: #fff7f7; }

/* NOTES (back) */
.notes-block { flex: 1; border-top: 0.6pt solid #000; margin-top: 2mm; padding-top: 1.5mm; display: flex; flex-direction: column; min-height: 0; }
.notes-heading { font-size: 5.5pt; text-transform: uppercase; letter-spacing: 0.5pt; color: #888; margin-bottom: 1.5mm; flex-shrink: 0; }
.notes-lines { flex: 1; display: flex; flex-direction: column; justify-content: space-around; }
.notes-line-rule { border-bottom: 0.4pt solid #bbb; height: 0; }

/* LEGEND (front) */
.legend { border-top: 0.3pt solid #ddd; padding-top: 1.2mm; margin-top: 1.5mm; font-size: 4.2pt; color: #555; line-height: 1.45; flex-shrink: 0; }
.legend > div { margin-bottom: 0.5mm; }
.legend b { color: #000; }
.lg.green { color: #15803d; }
.lg.red   { color: #b91c1c; }

@media print { body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }
</style>
</head>
<body>

<script>
const COURSE_PARS = [null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null];
function par(i) { return COURSE_PARS[i]; }

function holeRow(i) {
  const p = par(i);
  return `
    <div class="hole-row">
      <div class="cell left"><span class="hole-num">${i+1}</span></div>
      <div class="cell"><div class="pbox">${p != null ? p : ''}</div></div>
      <div class="cell"><div class="score-box"></div></div>
      <div class="cell"><div class="sbox"></div></div>
      <div class="cell"><div class="sbox green"></div></div>
      <div class="cell"><div class="sbox"></div></div>
      <div class="cell"><div class="sbox"></div></div>
      <div class="cell"><div class="sbox red"></div></div>
      <div class="cell"><div class="tbox"></div></div>
    </div>`;
}

function colHeaders() {
  return `
    <div class="col-hdr">
      <div class="ch left">#</div>
      <div class="ch">Par</div>
      <div class="ch">Score</div>
      <div class="ch">Drive</div>
      <div class="ch green">GIR</div>
      <div class="ch">App</div>
      <div class="ch">Short</div>
      <div class="ch red">Putts</div>
      <div class="ch red">Trbl</div>
    </div>`;
}

function legend() {
  return `
    <div class="legend">
      <div><b>BLANK = FINE — mark only faults.</b> &nbsp;<b>Drive</b> <b>s</b> advantage lost · <b>x</b> green gone (x, no Trbl = obstructed)</div>
      <div><b>App</b> = all tee→green shots (P3: tee · P5: 2nd+3rd), worst counts: <b>m</b> scoring-club miss (7i–W) · <b>w</b> wedge wrong side · <b>x</b> dead, any club</div>
      <div><b>Short</b> <b>c</b> choked a makeable save &nbsp;·&nbsp; <b>Putts</b> count &nbsp;·&nbsp; <b>Trbl</b> <span class="lg red">W</span> water · <span class="lg red">O</span> OB · <span class="lg red">U</span> unplayable <b>= stroke</b> · FB/GB bunker <b>= no stroke</b></div>
    </div>`;
}

function frontCard() {
  let holes = '';
  for (let i = 0; i < 9; i++) holes += holeRow(i);
  return `
  <div class="card">
    <div class="front-title">
      <div class="front-title-text">⛳ Scorecard</div>
      <div class="comp-wrap">
        <div class="comp-box"></div><span class="comp-lbl">Comp</span>
        <div class="comp-box"></div><span class="comp-lbl">Pract</span>
      </div>
    </div>
    <div class="header-field"><span class="hf-lbl">Date</span><div class="hf-line"></div></div>
    <div class="header-field"><span class="hf-lbl">Course</span><div class="hf-line"></div></div>
    <div class="header-field"><span class="hf-lbl">Tee</span><div class="hf-line"></div></div>
    ${colHeaders()}
    <div class="holes">${holes}</div>
    ${legend()}
  </div>`;
}

function backCard() {
  let holes = '';
  for (let i = 9; i < 18; i++) holes += holeRow(i);
  const lines = Array(5).fill('<div class="notes-line-rule"></div>').join('');
  return `
  <div class="card">
    <div class="back-header">
      <div class="back-title">Back 9</div>
      <div class="back-sub">↑ continued</div>
    </div>
    ${colHeaders()}
    <div class="holes">${holes}</div>
    <div class="notes-block">
      <div class="notes-heading">Notes</div>
      <div class="notes-lines">${lines}</div>
    </div>
  </div>`;
}

document.write(`
  <div class="page">${frontCard()}${frontCard()}${frontCard()}${frontCard()}</div>
  <div class="page">${backCard()}${backCard()}${backCard()}${backCard()}</div>
`);
</script>
</body>
</html>
